<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chronicles of Aether - GUI</title>
    <style>
        /* 1. GRUNDGERÜST (Verhindert Scrollen und Ränder auf dem iPhone) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; /* Verhindert Textmarkierung beim Tippen */
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent; /* Entfernt den hässlichen blauen Klick-Kasten auf iOS */
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #121216;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #e0e0e6;
        }

        /* Das Spiel-Layout: Aufgeteilt in Karte (oben) und UI-Konsole (unten) */
        #game-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            max-width: 450px; /* Perfekte Handy-Breite für den PC-Browser-Test */
            margin: 0 auto;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* 2. SPIELFELD (Oben) */
        #map-area {
            flex: 1;
            position: relative;
            background: radial-gradient(circle, #1a1a24 0%, #0f0f14 100%);
        }

        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 3. TOP-BAR (Ressourcen & Status ganz oben über der Karte) */
        .top-hud {
            position: absolute;
            top: calc(10px + env(safe-area-inset-top)); /* Berücksichtigt die iPhone Notch */
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            pointer-events: none; /* Klicks gehen durch das HUD auf die Karte */
        }

        .hud-card {
            background: rgba(20, 20, 28, 0.85);
            border: 1px solid rgba(229, 193, 88, 0.3); /* Subtiler Goldrand */
            backdrop-filter: blur(8px); /* Schöner Unschärfe-Effekt wie bei iOS */
            -webkit-backdrop-filter: blur(8px);
            padding: 8px 14px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: auto; /* Macht die Karten selbst wieder klickbar */
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .profile-img {
            width: 32px;
            height: 32px;
            background: #e5c158;
            border-radius: 50%;
            border: 2px solid #121216;
        }

        .bar-container {
            width: 100px;
            height: 8px;
            background: #2a2a35;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 2px;
        }

        .hp-bar { width: 85%; height: 100%; background: #ff4a5a; }

        .gold-text { color: #e5c158; font-weight: bold; font-size: 14px; }

        /* 4. DAUMEN-STEUERUNG & KAMPF-GUI (Unten) */
        .bottom-ui {
            background: linear-gradient(to top, #0f0f14 80%, rgba(15,15,20,0.9) 100%);
            border-top: 2px solid rgba(229, 193, 88, 0.2);
            padding: 15px 15px calc(15px + env(safe-area-inset-bottom)) 15px; /* iOS Home-Bar Schutz */
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Action Grid für Skills / Interaktionen */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .skill-button {
            aspect-ratio: 1; /* Perfekt quadratisch */
            background: #1c1c24;
            border: 1px solid #3a3a4a;
            border-radius: 14px;
            color: #fff;
            font-size: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s ease, border-color 0.2s;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.05);
        }

        /* Wenn man mit dem Daumen draufdrückt */
        .skill-button:active {
            transform: scale(0.92);
            border-color: #e5c158;
            background: #252530;
        }

        .skill-button span {
            font-size: 10px;
            color: #8a8a9a;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Großer Haupt-Interaktionsknopf */
        .main-action-btn {
            background: linear-gradient(135deg, #e5c158 0%, #b8932c 100%);
            color: #121216;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(229, 193, 88, 0.3);
            transition: transform 0.1s;
        }

        .main-action-btn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

<div id="game-container">
    
    <div id="map-area">
        <canvas id="game-canvas"></canvas>

        <div class="top-hud">
            <div class="hud-card">
                <div class="profile-img"></div>
                <div>
                    <div style="font-size: 12px; font-weight: bold;">Pirat / Hybrid</div>
                    <div class="bar-container"><div class="hp-bar"></div></div>
                </div>
            </div>
            <div class="hud-card">
                <span style="font-size: 14px;">🪙</span>
                <span class="gold-text" id="gold-display">1.250</span>
            </div>
        </div>
    </div>

    <div class="bottom-ui">
        
        <div class="action-grid">
            <div class="skill-button" onclick="triggerSkill('Säbel')">⚔️<span>Säbel</span></div>
            <div class="skill-button" onclick="triggerSkill('Pistole')">🔫<span>Pistole</span></div>
            <div class="skill-button" onclick="triggerSkill('Heilung')">🧪<span>Trank</span></div>
            <div class="skill-button" onclick="triggerSkill('Inventar')">🎒<span>Inv</span></div>
        </div>

        <button class="main-action-btn" id="main-action">Feld erkunden</button>
        
    </div>
</div>

<script>
    // Ein bisschen JavaScript, damit das Interface direkt lebendig wirkt
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    // Canvas-Größe an die UI anpassen
    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        
        // Platzhalter-Karte zeichnen
        ctx.fillStyle = '#222230';
        ctx.strokeStyle = 'rgba(229, 193, 88, 0.15)';
        ctx.lineWidth = 2;
        
        // Zeichnet ein einfaches Raster als Beweis, dass der Canvas läuft
        for(let i = 0; i < canvas.width; i += 40) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }
        
        // Spieler-Symbol (Mitte)
        ctx.fillStyle = '#ff4a5a';
        ctx.beginPath();
        ctx.arc(canvas.width/2, canvas.height/2, 12, 0, Math.PI*2);
        ctx.fill();
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Feedback für die Buttons
    function triggerSkill(name) {
        console.log("Skill aktiviert: " + name);
        if(name === 'Säbel') {
            document.getElementById('main-action').innerText = "Gegner angreifen!";
            document.getElementById('main-action').style.background = "linear-gradient(135deg, #ff4a5a 0%, #b32432 100%)";
            document.getElementById('main-action').style.boxShadow = "0 4px 15px rgba(255, 74, 90, 0.3)";
            document.getElementById('main-action').style.color = "#fff";
        } else {
            // Zurücksetzen auf Standard
            document.getElementById('main-action').innerText = "Feld erkunden";
            document.getElementById('main-action').style.background = "linear-gradient(135deg, #e5c158 0%, #b8932c 100%)";
            document.getElementById('main-action').style.boxShadow = "0 4px 15px rgba(229, 193, 88, 0.3)";
            document.getElementById('main-action').style.color = "#121216";
        }
    }
</script>

</body>
</html>
